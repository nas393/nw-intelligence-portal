<!DOCTYPE html>
<html>
<head>
  <title>NW Intelligence Portal</title>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      background-color: #0A0A0A;
      color: #E5E5E5;
      font-family: monospace;
    }

    header {
      padding: 20px;
      border-bottom: 1px solid #1F1F1F;
      font-size: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .panel {
      background-color: #111111;
      border: 1px solid #1F1F1F;
      padding: 20px;
      border-radius: 6px;
    }

    .title {
      color: #00BFFF;
      margin-bottom: 10px;
    }

    .value {
      font-size: 22px;
    }

    .green { color: #00FF88; }
    .orange { color: #FFA500; }
    .red { color: #FF3B3B; }

    #loginBox {
      max-width: 300px;
      margin: 100px auto;
      background: #111;
      padding: 20px;
      border: 1px solid #1F1F1F;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      background: #000;
      color: #fff;
      border: 1px solid #333;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #00BFFF;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="loginBox">
  <h3>Login</h3>
  <input id="username" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="login()">Enter</button>
  <div id="loginError" style="color:red;margin-top:10px;"></div>
</div>

<div id="app" style="display:none;">
<header>
  Angola Intelligence Platform
  <div style="font-size:12px;color:#888;">Internal System</div>
</header>

<div class="container">

  <div class="panel">
    <div class="title">USD / AOA</div>
    <div id="fxValue" class="value">Loading...</div>
  </div>

  <div class="panel">
    <div class="title">Risk Breakdown</div>
    <div id="riskValue"></div>
  </div>

  <div class="panel">
    <div class="title">Commodities</div>
    <div id="commodities"></div>
  </div>

  <div class="panel">
    <div class="title">Regulation Risk</div>
    <div id="regulation"></div>
  </div>

</div>
</div>

<script>
const API_URL = "https://nassim-angola-intel.onrender.com";
let authToken = null;

async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const response = await fetch(API_URL + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username, password})
  });

  if (response.status !== 200) {
    document.getElementById("loginError").innerText = "Invalid credentials";
    return;
  }

  const data = await response.json();
  authToken = data.token;

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";

  fetchData();
  setInterval(fetchData, 300000);
}

async function fetchData() {

  const headers = {
    "Authorization": authToken
  };

  const fxRes = await fetch(API_URL + "/fx", {headers});
  const fxData = await fxRes.json();
  document.getElementById("fxValue").innerText = fxData["USD/AOA"];

  const riskRes = await fetch(API_URL + "/risk", {headers});
  const riskData = await riskRes.json();

  document.getElementById("riskValue").innerHTML = `
    FX Risk: ${riskData.fx_risk}<br>
    Commodity Risk: ${riskData.commodity_risk}<br>
    Regulation Risk: ${riskData.regulation_risk}<br>
    <strong>Total Risk: ${riskData.total_risk}</strong>
  `;

  const commRes = await fetch(API_URL + "/commodities", {headers});
  const commData = await commRes.json();

  let commHtml = "";
  for (let key in commData) {
    commHtml += key + ": " + commData[key].toFixed(2) + "<br>";
  }
  document.getElementById("commodities").innerHTML = commHtml;

  const regRes = await fetch(API_URL + "/regulations", {headers});
  const regData = await regRes.json();
  document.getElementById("regulation").innerText =
    "Regulation Risk Score: " + regData.regulation_risk;
}
</script>

</body>
</html>
