<!DOCTYPE html>
<html>
<head>
  <title>NW Intelligence Portal</title>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      background-color: #0A0A0A;
      color: #E5E5E5;
      font-family: monospace;
    }

    header {
      padding: 20px;
      border-bottom: 1px solid #1F1F1F;
      font-size: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .panel {
      background-color: #111111;
      border: 1px solid #1F1F1F;
      padding: 20px;
      border-radius: 6px;
    }

    .title {
      color: #00BFFF;
      margin-bottom: 10px;
    }

    .value {
      font-size: 24px;
      margin-top: 5px;
    }

    .green { color: #00FF88; }
    .orange { color: #FFA500; }
    .red { color: #FF3B3B; }

    #loginBox {
      max-width: 300px;
      margin: 100px auto;
      background: #111;
      padding: 20px;
      border: 1px solid #1F1F1F;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      background: #000;
      color: #fff;
      border: 1px solid #333;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #00BFFF;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="loginBox">
  <h3>Login</h3>
  <input id="username" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="login()">Enter</button>
  <div id="loginError" style="color:red;margin-top:10px;"></div>
</div>

<div id="app" style="display:none;">
<header>
  Angola Market Intelligence Portal
  <div style="font-size:12px;color:#888;">Built by Nassim Watfa</div>
</header>

<div class="container">

  <div class="panel">
    <div class="title">USD / AOA</div>
    <div id="fxValue" class="value">Loading...</div>
  </div>

  <div class="panel">
    <div class="title">Angola Risk Score</div>
    <div id="riskValue" class="value">Loading...</div>
  </div>

  <div class="panel">
    <div class="title">Commodities</div>
    <div id="commodities"></div>
  </div>

  <div class="panel">
    <div class="title">Regulation / Laws Feed</div>
    <div id="laws">Monitoring...</div>
  </div>

</div>
</div>

<script>
const API_URL = "https://nassim-angola-intel.onrender.com";

const users = {
  "Nassim": "101112",
  "user": "qwerty1"
};

function login() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  if (users[u] && users[u] === p) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";
    fetchData();
    setInterval(fetchData, 300000);
  } else {
    document.getElementById("loginError").innerText = "Invalid credentials";
  }
}

async function fetchData() {
  try {
    const fxRes = await fetch(API_URL + "/fx");
    const fxData = await fxRes.json();
    document.getElementById("fxValue").innerText = fxData["USD/AOA"];

    const riskRes = await fetch(API_URL + "/risk");
    const riskData = await riskRes.json();
    const risk = riskData["Angola Risk Score"];
    const riskEl = document.getElementById("riskValue");
    riskEl.innerText = risk;

    if (risk > 60) riskEl.className = "value red";
    else if (risk > 40) riskEl.className = "value orange";
    else riskEl.className = "value green";

    const commRes = await fetch(API_URL + "/commodities");
    const commData = await commRes.json();

    let html = "";
    for (let key in commData) {
      html += key + ": " + commData[key].toFixed(2) + "<br>";
    }
    document.getElementById("commodities").innerHTML = html;

    document.getElementById("laws").innerText =
      "Monitoring Angola government publications...";

  } catch {
    document.getElementById("fxValue").innerText = "Error";
  }
}
</script>

</body>
</html>
